<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amazonian Paysliper</title>

<style>
:root{
  --bg:#0f172a;
  --card:#ffffff;
  --muted:#64748b;
  --primary:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --blue:#2563eb;
  --orange:#ea580c;
}

*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);}

.app{max-width:430px;margin:0 auto;padding:12px 12px 80px;}

.header{color:#fff;text-align:center;margin:6px 0 10px;}
.header h1{font-size:20px;margin:4px 0;}
.header .sub{font-size:12px;color:#cbd5f5}

.panel{background:#fff;border-radius:16px;padding:14px;}

.notice{
  background:#fef3c7;
  border-left:6px solid #f59e0b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:13px;
  font-weight:600;
}

.field{display:flex;flex-direction:column;margin:6px 0}
.label{font-size:12px;color:var(--muted);margin-bottom:4px}

.input, select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  font-size:16px;
}

.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.cta-wrap{position:fixed;left:0;right:0;bottom:0;padding:10px;background:linear-gradient(180deg,rgba(15,23,42,0),rgba(15,23,42,1));}
.cta{max-width:430px;margin:0 auto}

button{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:var(--primary);
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.result{margin-top:12px}

.card{
  background:#f8fafc;
  border-radius:14px;
  padding:12px;
  margin:8px 0;
}

.card b{display:block;font-size:12px;color:#334155;margin-bottom:4px}
.card .val{font-size:18px;font-weight:800}

.card.green{border-left:6px solid var(--green)}
.card.red{border-left:6px solid var(--red)}
.card.blue{border-left:6px solid var(--blue)}
.card.orange{border-left:6px solid var(--orange)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.footer{color:#94a3b8;text-align:center;font-size:11px;margin-top:10px}

/* 🔐 LOGIN OVERLAY */
#loginBox{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:9999;
}

.login-card{
  background:white;
  width:100%;
  max-width:360px;
  padding:16px;
  border-radius:16px;
}

.login-card h2{
  margin:0 0 10px;
  font-size:18px;
}

.login-card p{
  font-size:12px;
  color:#64748b;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginBox">
  <div class="login-card">
    <h2>Enter Email to Continue</h2>
    <p>You must register before using the calculator.</p>

    <input class="input" type="email" id="email" placeholder="Enter your email">
    <button style="margin-top:10px" onclick="register()">Register</button>
  </div>
</div>

<div class="app">
  <div class="header">
    <div style="font-size:24px">💰</div>
    <h1>Amazonian Paysliper</h1>
    <div class="sub">Allow £3–£7 difference • Made by Anas</div>
  </div>

  <div class="panel">

    <div class="notice">
      You have to thank Anas to get the results 🙏
    </div>

    <div class="field">
      <div class="label">Message</div>
      <input class="input" type="text" id="msg" placeholder="Type: thanks / thank you / cheers">
    </div>

    <div class="row">
      <div class="field">
        <div class="label">Hours</div>
        <input class="input" type="number" id="hours" placeholder="Hours worked">
      </div>

      <div class="field">
        <div class="label">Rate (£)</div>
        <input class="input" type="number" id="rate" placeholder="Hourly rate">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="label">Shift</div>
        <select id="shift">
          <option value="night">Night</option>
          <option value="day">Day</option>
        </select>
      </div>

      <div class="field">
        <div class="label">Pension (£/wk)</div>
        <input class="input" type="number" id="pension" placeholder="Optional">
      </div>
    </div>

    <div id="result" class="result"></div>
  </div>

  <div class="footer">Estimate only</div>
</div>

<div class="cta-wrap">
  <div class="cta">
    <button onclick="calculate()">Calculate</button>
  </div>
</div>

<script>

/* 🔐 REGISTER SYSTEM */
function register(){
  const email = document.getElementById("email").value.trim();

  if(!email || !email.includes("@")){
    alert("Enter a valid email");
    return;
  }

  localStorage.setItem("registeredEmail", email);
  document.getElementById("loginBox").style.display = "none";
}

window.onload = function(){
  const saved = localStorage.getItem("registeredEmail");
  if(saved){
    document.getElementById("loginBox").style.display = "none";
  }
}

/* 💰 YOUR ORIGINAL CALCULATOR */
function calculate(){

  const msg = document.getElementById('msg').value.toLowerCase().trim();

  const allowed = msg.includes("thanks") ||
                  msg.includes("thank you") ||
                  msg.includes("cheers");

  if(!allowed){
    document.getElementById('result').innerHTML =
      `<div class="card red"><b>No Thanks</b><div class="val">No thanks, no results</div></div>`;
    return;
  }

  const h = parseFloat(document.getElementById('hours').value);
  if(!h){ alert('Enter hours'); return; }

  const r = parseFloat(document.getElementById('rate').value);
  const shift = document.getElementById('shift').value;

  const pensionVal = document.getElementById('pension').value;
  const pension = pensionVal === "" ? 0 : parseFloat(pensionVal);

  const c1 = Math.min(h,40);
  const c2 = Math.max(0, Math.min(h-40,10));
  const c3 = Math.max(0, h-50);

  const base = (c1*r) + (c2*r*1.5) + (c3*r*2);

  const nightH = (shift==='night') ? h*0.16 : 0;
  const nightPay = nightH*r;

  const pot = (c2*r*1.5 + c3*r*2) * 0.09219178082;

  const weeklyGross = base + nightPay + pot;

  const weeklyDeductions = pension;

  const annualAfter = (weeklyGross - weeklyDeductions) * 52;

  function taxCalc(s){
    const PA=12570;
    const taxable=Math.max(0,s-PA);
    const tax=taxable*0.20;
    const ni=taxable*0.08;
    return {tax,ni,net:s-tax-ni};
  }

  const res = taxCalc(annualAfter);

  const weeklyNet = res.net / 52;
  const weeklyTax = res.tax / 52;

  const card = (t,v,c)=>
    `<div class="card ${c}"><b>${t}</b><div class="val">${v}</div></div>`;

  let html = '';

  html += `<div class="grid">
    ${card('Weekly Gross', `£${weeklyGross.toFixed(2)}`, 'blue')}
    ${card('Weekly Net', `£${weeklyNet.toFixed(2)}`, 'green')}
  </div>`;

  html += `<div class="grid">
    ${card('Weekly Tax', `£${weeklyTax.toFixed(2)}`, 'red')}
    ${card('Weekly Pension', `£${weeklyDeductions.toFixed(2)}`, 'orange')}
  </div>`;

  document.getElementById('result').innerHTML = html;
}

window.addEventListener('keydown', e=>{
  if(e.key==="Enter") calculate();
});
</script>

</body>
</html>
