<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amazonian Paysliper (Mobile)</title>
<style>
/* Force mobile-first layout */
body {
  font-family: Arial, sans-serif;
  margin:0;
  background:#0f172a;
}

.container {
  max-width:420px;
  margin:auto;
  padding:12px;
}

.card-main {
  background:white;
  border-radius:16px;
  padding:16px;
}

h1 {
  text-align:center;
  font-size:20px;
  margin-bottom:6px;
}

.subtitle {
  text-align:center;
  font-size:12px;
  color:#555;
  margin-bottom:12px;
}

input, select, button {
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

button {
  background:#2563eb;
  color:white;
  font-weight:bold;
  border:none;
}

.result { margin-top:10px; }

.card {
  background:#f1f5f9;
  border-radius:12px;
  padding:12px;
  margin:8px 0;
}

.green { border-left:5px solid #16a34a; }
.red { border-left:5px solid #dc2626; }
.blue { border-left:5px solid #2563eb; }

.note {
  text-align:center;
  font-size:11px;
  margin-top:10px;
  color:#ccc;
}

/* Hide desktop overflow feel */
@media (min-width:600px){
  body::before{
    content:"Mobile only view – use phone for best experience";
    display:block;
    text-align:center;
    color:white;
    padding:10px;
  }
}
</style>
</head>
<body>

<div class="container">
<div class="card-main">

<h1>Amazonian Paysliper</h1>
<div class="subtitle">Allow £3–£7 difference</div>

<input type="number" id="hours" placeholder="Hours worked">
<input type="number" id="rate" value="14.6" placeholder="Hourly rate">

<select id="shift">
<option value="night">Night</option>
<option value="day">Day</option>
</select>

<input type="number" id="pension" value="0" placeholder="Pension (£)">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>
<div class="note">Estimate only</div>
</div>

<script>
function calculate(){
let h=parseFloat(hours.value);
if(!h){alert('Enter hours');return;}
let r=parseFloat(rate.value);
let shiftVal=shift.value;
let pensionVal=parseFloat(pension.value)||0;

let c1=Math.min(h,40);
let c2=Math.max(0,Math.min(h-40,10));
let c3=Math.max(0,h-50);

let pay1=c1*r;
let pay2=c2*(r*1.5);
let pay3=c3*(r*2);

let base=pay1+pay2+pay3;

let nightH=(shiftVal==='night')?h*0.16:0;
let nightPay=nightH*r;

let pot=(pay2+pay3)*0.09219178082;

let weeklyGross=base+nightPay+pot;
let annualGross=weeklyGross*52;
let annualAfterPension=(weeklyGross-pensionVal)*52;

function taxCalc(s){
let PA=12570;
let tax=Math.max(0,s-PA)*0.20;
let ni=Math.max(0,s-PA)*0.08;
return {tax,ni,net:s-tax-ni};
}

let res=taxCalc(annualAfterPension);

let html='';
html+=`<div class='card green'><b>Weekly Net</b><br>£${(res.net/52).toFixed(2)}</div>`;
html+=`<div class='card blue'><b>Weekly Gross</b><br>£${weeklyGross.toFixed(2)}</div>`;
html+=`<div class='card green'><b>Annual Net</b><br>£${res.net.toFixed(2)}</div>`;
html+=`<div class='card blue'><b>Annual Gross</b><br>£${annualGross.toFixed(2)}</div>`;
html+=`<div class='card red'><b>Tax</b><br>£${res.tax.toFixed(2)}</div>`;
html+=`<div class='card red'><b>NI</b><br>£${res.ni.toFixed(2)}</div>`;

result.innerHTML=html;
}

window.addEventListener('keydown',e=>{if(e.key==='Enter')calculate();});
</script>

</body>
</html>
